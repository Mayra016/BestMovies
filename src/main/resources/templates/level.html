<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Best Movie</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-T3c6CoIi6uLrA9TneNEoa7RxnatzjcDSCmG1MXxSR1GAsXEV/Dwwykc2MPK8M2HN" crossorigin="anonymous">
	<link rel="preconnect" href="https://fonts.googleapis.com">
	<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
	<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=EB+Garamond:wght@600;700;800&family=Spicy+Rice&display=swap" rel="stylesheet">
	<link rel="stylesheet" type="text/css" href="/css/level.css">


</head>
<body>
	<div class="page-background">
		<div class="container">
			<div class="header-bar">
				<button class="menu-btn" onclick="menu()">
				    <img class="menu-logo" src="/images/menu-logo.png" alt="menu logo" />
				    <h5 th:text="#{MENU}"></h5>
				</button>
				<div class="score">
					<h5>Score: <h6 th:text="${score}"></h6></h5>
				</div>	
			</div>
			<div class="movies" th:each="movie : ${levelMovies}">
				<form class="movie" thaction="@{/checkAnswer}" method="POST">
					<input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}" />
					<button type="submit" onclick="checkAnswer(/*[(${movie.movieName})]*/)">
						<img th:src="${movie.imageURL}">
						<h1 th:text="${movie.movieName}"></h1>
					</button>							
				</form> 
			</div>	
			<div id="lost" class="lost" style="display: none;">
				<h2>You have lost</h2>
				<button th:href="@{/menu}">Play again</button>
			</div>
		</div>
		
	</div>
		
<script th:inline="javascript">

    function checkAnswer(movieName) {
        var csrfToken = document.querySelector("meta[name='_csrf']").getAttribute("content");
    
        console.log("movie name", movieName);
        // Enviar el token con cada solicitud
        fetch('http://localhost:8080/checkAnswer', {
            method: 'POST',
            mode: 'cors',
            credentials: 'include',
            headers: {
                'Content-Type': 'application/json',
                'X-CSRF-TOKEN': document.querySelector('input[name="_csrf"]').value
            },
            body: JSON.stringify({playerAnswer: movieName})
        })
        .catch(error => {
            console.error("Error fetching letters:", error);
        });
    }
	function menu() {
		window.location.href = "/menu";
	}
	
	
</script>
</body>
</html>
